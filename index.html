<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 Happy Birthday Omry!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; -webkit-tap-highlight-color:transparent; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#c { position:fixed; top:0; left:0; }
.ovr {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.93); color:#fff; z-index:20;
  padding:24px; text-align:center; gap:14px;
}
.ovr h1 { font-size:clamp(20px,5vw,38px); }
.ovr h2 { font-size:clamp(17px,4vw,28px); }
.ovr p  { font-size:clamp(13px,3vw,18px); opacity:.85; max-width:480px; line-height:1.5; }
.btn {
  background:#e74c3c; color:#fff; border:none;
  padding:14px 36px; font-size:clamp(14px,3.5vw,21px);
  cursor:pointer; border-radius:10px; font-family:'Courier New',monospace;
  transition:transform .1s,filter .1s;
}
.btn:hover,.btn:active { filter:brightness(1.2); transform:scale(1.05); }
.btn.green { background:#27ae60; }
.btn.pink  { background:#e91e63; }
.lbl {
  display:inline-flex; align-items:center; gap:8px;
  background:#1a1a2e; border:2px dashed #555; color:#fff;
  padding:12px 24px; font-size:clamp(12px,3vw,17px);
  cursor:pointer; border-radius:8px; font-family:'Courier New',monospace;
}
.lbl:hover { border-color:#aaa; }
.face { width:70px; height:70px; border-radius:50%; border:3px solid #fff; object-fit:cover; display:none; }
.hint { font-size:clamp(10px,2vw,13px); opacity:.5; }
.off { display:none !important; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<audio id="bgm" src="OmriBirthdayGame/theme.mp3" loop preload="auto"></audio>

<!-- Start Screen -->
<div class="ovr" id="sc0">
  <h1>🎂 Happy Birthday Omry! 🎂</h1>
  <p>Your entire life story — as a <b>platformer game</b>.<br>8 stages. Pure chaos. 100% love.</p>
  <p id="spriteStatus" style="font-size:13px;opacity:0.6;">Loading sprites...</p>
  <button class="btn" id="b0">🎮 BEGIN THE ADVENTURE!</button>
</div>

<!-- Rotate Screen -->
<div class="ovr off" id="rotateScreen" style="background:#111;">
  <div style="font-size:clamp(50px,15vw,80px);line-height:1.2">📱</div>
  <h2 style="font-size:clamp(20px,5vw,32px);margin-top:10px">Rotate Your Device!</h2>
  <p>This game is designed for <b>landscape mode</b>.</p>
  <p style="font-size:clamp(30px,8vw,50px);margin:10px 0">🔄</p>
</div>

<script>
'use strict';
// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y); this.quadraticCurveTo(x+w, y, x+w, y+r);
    this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h); this.quadraticCurveTo(x, y+h, x, y+h-r);
    this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y);
    this.closePath();
    return this;
  };
}

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const GW = 800, GH = 450;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = GW; canvas.height = GH;
let scale = 1;

function resize() {
  const sw = window.innerWidth / GW, sh = window.innerHeight / GH;
  scale = Math.min(sw, sh);
  const cw = GW * scale, ch = GH * scale;
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.style.left   = ((window.innerWidth  - cw) / 2) + 'px';
  canvas.style.top    = ((window.innerHeight - ch) / 2) + 'px';
  // Show rotate overlay in portrait
  const portrait = window.innerHeight > window.innerWidth;
  document.getElementById('rotateScreen').classList.toggle('off', !portrait);
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════════
//  SPRITES — loaded from OmriBirthdayGame/ folder
// ═══════════════════════════════════════════════════════════
const SPR = { omry: null, amit: null, hadas: null, rinat: null };
let spritesLoaded = 0;

function loadStaticSprites() {
  const names = ['omry', 'amit', 'hadas', 'rinat'];
  names.forEach(name => {
    const img = new Image();
    img.onload = () => {
      SPR[name] = img;
      spritesLoaded++;
      const el = document.getElementById('spriteStatus');
      if (el) el.textContent = `Sprites loaded: ${spritesLoaded}/${names.length} ✓`;
    };
    img.onerror = () => {
      spritesLoaded++;
      const el = document.getElementById('spriteStatus');
      if (el) el.textContent = `Sprites: ${spritesLoaded}/${names.length} (some missing, using defaults)`;
    };
    img.src = `OmriBirthdayGame/${name}.png`;
  });
}
loadStaticSprites();

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
const K = {};
window.addEventListener('keydown', e => {
  K[e.code] = true;
  if ([32,37,38,39,40].includes(e.keyCode)) e.preventDefault();
  if ((e.code === 'Space' || e.code === 'Enter') && (GS === 'story' || GS === 'stage_win')) nextState();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

const TC = { left:false, right:false, jump:false };

function toGC(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left) / r.width * GW, y: (cy - r.top) / r.height * GH };
}

function getBtns() {
  return [
    { id:'left',  x:12,    y:GH-100, w:88, h:88 },
    { id:'right', x:108,   y:GH-100, w:88, h:88 },
    { id:'jump',  x:GW-106, y:GH-100, w:88, h:88 },
  ];
}

// Continue button zone (drawn on story/win screens)
const CONT_BTN = { x:GW/2-150, y:GH-90, w:300, h:62 };
function inContBtn(p) {
  return p.x>CONT_BTN.x && p.x<CONT_BTN.x+CONT_BTN.w && p.y>CONT_BTN.y && p.y<CONT_BTN.y+CONT_BTN.h;
}

function applyGameTouch(touches) {
  TC.left = TC.right = TC.jump = false;
  for (const t of touches) {
    const p = toGC(t.clientX, t.clientY);
    for (const b of getBtns())
      if (p.x>b.x && p.x<b.x+b.w && p.y>b.y && p.y<b.y+b.h) TC[b.id] = true;
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (GS === 'story' || GS === 'stage_win') {
    for (const t of e.changedTouches) { if (inContBtn(toGC(t.clientX,t.clientY))) { nextState(); return; } }
    return; // don't pass story/win touches to game controls
  }
  applyGameTouch(e.touches);
}, {passive:false});
canvas.addEventListener('touchmove',   e => { e.preventDefault(); applyGameTouch(e.touches); }, {passive:false});
canvas.addEventListener('touchend',    e => { e.preventDefault(); applyGameTouch(e.touches); }, {passive:false});
canvas.addEventListener('touchcancel', e => { e.preventDefault(); applyGameTouch(e.touches); }, {passive:false});
canvas.addEventListener('click', e => {
  if (GS === 'story' || GS === 'stage_win') { if (inContBtn(toGC(e.clientX,e.clientY))) nextState(); }
});

// ═══════════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════════
const GRAVITY = 0.48, JUMP_F = -12, SPEED = 4.6, FRIC = 0.78;

let P = null;
function mkPlayer(x, y) {
  return { x, y, vx:0, vy:0, w:36, h:50, onGround:false, facingRight:true, jumps:0, maxJumps:2, invincible:0, lives:3, _pj:false };
}

function updatePlayer() {
  if (!P || GS !== 'playing') return;
  const left  = K.ArrowLeft  || K.KeyA || TC.left;
  const right = K.ArrowRight || K.KeyD || TC.right;
  const jump  = K.ArrowUp || K.KeyW || K.Space || TC.jump;

  if (left)  { P.vx -= 1.8; P.facingRight = false; }
  if (right) { P.vx += 1.8; P.facingRight = true;  }
  if (!left && !right) P.vx *= FRIC;
  P.vx = Math.max(-SPEED, Math.min(SPEED, P.vx));

  if (jump && !P._pj && P.jumps < P.maxJumps) {
    P.vy = JUMP_F; P.jumps++; P.onGround = false; sfxJump();
  }
  P._pj = jump;

  P.vy += GRAVITY;
  if (P.vy > 16) P.vy = 16;

  P.x += P.vx;
  P.x = Math.max(0, Math.min(P.x, STAGE.worldW - P.w));

  P.y += P.vy;
  P.onGround = false;

  for (const pl of STAGE.platforms) platCollide(P, pl);

  if (P.y > STAGE.worldH + 80) {
    P.lives--;
    if (P.lives <= 0) { sfxGameOver(); GS = 'dead'; deadTimer = 90; return; }
    sfxFall();
    P.x = STAGE.spawnX; P.y = STAGE.spawnY;
    P.vx = 0; P.vy = 0; P.invincible = 120;
  }
  if (P.invincible > 0) P.invincible--;
}

function platCollide(p, pl) {
  if (p.x+p.w <= pl.x || p.x >= pl.x+pl.w || p.y+p.h <= pl.y || p.y >= pl.y+pl.h) return;
  const oy_ = Math.min(p.y+p.h - pl.y, pl.y+pl.h - p.y);
  const ox_ = Math.min(p.x+p.w - pl.x, pl.x+pl.w - p.x);
  if (oy_ <= ox_) {
    if (p.vy >= 0 && p.y+p.h/2 < pl.y+pl.h/2) {
      p.y = pl.y - p.h; p.vy = 0; p.onGround = true; p.jumps = 0;
    } else if (p.vy < 0) { p.y = pl.y + pl.h; p.vy = 0; }
  } else {
    if (p.x+p.w/2 < pl.x+pl.w/2) p.x = pl.x - p.w;
    else p.x = pl.x + pl.w;
    p.vx = 0;
  }
}

function overlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// Shared damage helper — plays sfx and applies knockback
function dmgP(p, ex, vy) {
  p.lives--; p.invincible=90; p.vy=vy||(-9); p.vx=(p.x<ex)?-5:5;
  sfxHit();
  if(p.lives<=0){sfxGameOver();GS='dead';deadTimer=90;}
}

// ═══════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════
let CAM = { x:0, y:0 };
function updateCam() {
  if (!P || !STAGE) return;
  const tx = P.x + P.w/2 - GW/2;
  const ty = P.y + P.h/2 - GH*0.45;
  CAM.x += (tx - CAM.x) * 0.13;
  CAM.y += (ty - CAM.y) * 0.13;
  CAM.x = Math.max(0, Math.min(CAM.x, STAGE.worldW - GW));
  CAM.y = Math.max(0, Math.min(CAM.y, STAGE.worldH - GH));
}

// ═══════════════════════════════════════════════════════════
//  DRAWING UTILS
// ═══════════════════════════════════════════════════════════
function faceCircle(spr, cx, cy, r, fallback) {
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
  if (spr) { ctx.drawImage(spr, cx-r, cy-r, r*2, r*2); }
  else {
    ctx.fillStyle = fallback || '#95a5a6'; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${r*0.9}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', cx, cy);
  }
  ctx.restore();
}

function heart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s*0.35);
  ctx.bezierCurveTo(x - s*1.5, y - s*0.2, x - s*1.5, y + s*0.8, x, y + s*1.3);
  ctx.bezierCurveTo(x + s*1.5, y + s*0.8, x + s*1.5, y - s*0.2, x, y + s*0.35);
  ctx.fill();
}

function cloud(x, y) {
  ctx.beginPath();
  ctx.arc(x,    y,    28, 0, Math.PI*2);
  ctx.arc(x+28, y-10, 20, 0, Math.PI*2);
  ctx.arc(x+52, y,    25, 0, Math.PI*2);
  ctx.arc(x+26, y+12, 18, 0, Math.PI*2);
  ctx.fill();
}

function txt(s, x, y, sz, col, align) {
  ctx.fillStyle = col; ctx.font = `bold ${sz}px Courier New`;
  ctx.textAlign = align || 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(s, x, y);
}

function flash(t, a, b, rate) { return Math.floor(t * rate) % 2 === 0 ? a : b; }

// ═══════════════════════════════════════════════════════════
//  AUDIO / SFX
// ═══════════════════════════════════════════════════════════
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, type, dur, vol, delay) {
  try {
    const ac = getAC();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type || 'sine';
    const t0 = ac.currentTime + (delay || 0);
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(vol || 0.25, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.start(t0); o.stop(t0 + dur);
  } catch(e) {}
}
function sfxJump()     { tone(330,'sine',0.09,0.22); tone(520,'sine',0.08,0.18,0.07); }
function sfxCollect()  { tone(880,'sine',0.07,0.28); tone(1100,'sine',0.09,0.22,0.05); tone(1320,'sine',0.07,0.18,0.10); }
function sfxHit()      { tone(200,'sawtooth',0.15,0.35); tone(130,'sawtooth',0.12,0.3,0.1); }
function sfxFall()     { tone(220,'sawtooth',0.08,0.3); tone(180,'sawtooth',0.1,0.25,0.08); }
function sfxStageWin() { [523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.22,0.28,i*0.11)); }
function sfxGameOver() { [440,349,277,220].forEach((f,i)=>tone(f,'sawtooth',0.22,0.32,i*0.14)); }

// ═══════════════════════════════════════════════════════════
//  PALETTES
// ═══════════════════════════════════════════════════════════
const PAL = [
  { sky:'#ffe5ec', sky2:'#ffc2d1', g:'#ff758f', p:'#ffb3c6', body:'#ff4d6d', leg:'#c9184a', txt:'#800016' },  // 0 baby
  { sky:'#0d0221', sky2:'#1a0535', g:'#2d0149', p:'#3d0066', body:'#9b59b6', leg:'#6c3483', txt:'#d8b4fe' },  // 1 emo
  { sky:'#0a1628', sky2:'#0d2137', g:'#0d3320', p:'#1a4a2e', body:'#2ecc71', leg:'#1e8449', txt:'#00ff88' },  // 2 army
  { sky:'#16213e', sky2:'#0f3460', g:'#0f3460', p:'#533483', body:'#e94560', leg:'#1a1a2e', txt:'#e94560' },  // 3 IT
  { sky:'#ff6b9d', sky2:'#ff9eb5', g:'#f8bbd0', p:'#ff85a1', body:'#c2185b', leg:'#880e4f', txt:'#fff0f5' },  // 4 love
  { sky:'#fafafa', sky2:'#fff8e1', g:'#dc143c', p:'#ffd700', body:'#111',    leg:'#333',    txt:'#b8860b' },  // 5 wedding
  { sky:'#e3f2fd', sky2:'#bbdefb', g:'#90caf9', p:'#42a5f5', body:'#0277bd', leg:'#01579b', txt:'#0d47a1' },  // 6 daniel
  { sky:'#1a1a1a', sky2:'#2d2d2d', g:'#333',    p:'#404040', body:'#e74c3c', leg:'#c0392b', txt:'#f39c12' },  // 7 missiles
];
function pal() { return PAL[stageIdx] || PAL[0]; }

// ═══════════════════════════════════════════════════════════
//  PLAYER DRAWING
// ═══════════════════════════════════════════════════════════
function drawPlayer() {
  if (!P) return;
  if (P.invincible > 0 && Math.floor(P.invincible/5)%2 === 1) return;
  const cl = pal();
  const sx = Math.round(P.x - CAM.x), sy = Math.round(P.y - CAM.y);
  const cx = sx + P.w/2, cy = sy + P.h;
  const headR = P.w/2 + 1;
  const headY = sy + headR - 4;

  ctx.save();
  ctx.translate(cx, cy);
  if (!P.facingRight) ctx.scale(-1, 1);

  // Body
  ctx.fillStyle = cl.body;
  ctx.fillRect(-P.w/2, -P.h*0.55, P.w, P.h*0.55);

  // Legs
  const legSwing = P.onGround ? Math.sin(Date.now()*0.012) * 6 : 0;
  ctx.fillStyle = cl.leg;
  ctx.fillRect(-P.w/2, -P.h*0.17 + legSwing,  P.w/2-2, P.h*0.18);
  ctx.fillRect(2,      -P.h*0.17 - legSwing,  P.w/2-2, P.h*0.18);

  ctx.restore();

  // Head (face sprite)
  faceCircle(SPR.omry, cx, headY, headR, '#f5cba7');

  // Stage accessories
  drawAccessory(cx, headY, headR, P);
}

function drawAccessory(cx, hy, hr, p) {
  const cl = pal();
  ctx.save();
  ctx.translate(cx, hy);
  switch (stageIdx) {
    case 0: // Diaper
      ctx.fillStyle = '#fff';
      ctx.fillRect(-P.w/2-2, P.h*0.33, P.w+4, 12);
      break;
    case 1: // Emo side-swept hair
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.ellipse(-hr*0.2, -hr*0.7, hr*1.1, hr*0.55, -0.35, 0, Math.PI*2); ctx.fill();
      break;
    case 2: // Military beret
      ctx.fillStyle = '#2d5a27';
      ctx.beginPath(); ctx.ellipse(hr*0.25, -hr*0.65, hr*1.05, hr*0.5, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(0, -hr*0.7, 5, 0, Math.PI*2); ctx.fill();
      break;
    case 3: // Party hat
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.moveTo(-hr*0.3, -hr*0.9); ctx.lineTo(hr*0.3, -hr*0.9); ctx.lineTo(0, -hr*2); ctx.fill();
      ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(0, -hr*2, 5, 0, Math.PI*2); ctx.fill();
      break;
    case 5: case 6: // Wedding tux / Baby Daniel
      if (stageIdx === 5) {
        ctx.fillStyle = '#111';
        ctx.fillRect(-P.w/2, -P.h*0.5, P.w, P.h*0.45);
        ctx.fillStyle = '#fff'; ctx.fillRect(-4, -P.h*0.45, 8, P.h*0.35);
      }
      break;
    case 7: // Birthday hat
      ctx.fillStyle = '#f39c12';
      ctx.beginPath(); ctx.moveTo(-hr*0.35, -hr*0.85); ctx.lineTo(hr*0.35, -hr*0.85); ctx.lineTo(0, -hr*2); ctx.fill();
      ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(0, -hr*2, 5, 0, Math.PI*2); ctx.fill();
      break;
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  BACKGROUND DRAWING
// ═══════════════════════════════════════════════════════════
function drawBG() {
  const cl = pal(), t = Date.now()*0.001;
  const g = ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0, cl.sky); g.addColorStop(1, cl.sky2);
  ctx.fillStyle = g; ctx.fillRect(0,0,GW,GH);

  switch (stageIdx) {
    case 0: { // Baby - clouds
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      for (let i=0; i<6; i++) cloud(((i*290 + t*25)%(GW+160))-80, 50+Math.sin(i*1.5)*25);
      // Stars/bubbles
      for (let i=0; i<10; i++) {
        ctx.fillStyle = 'rgba(255,182,193,0.55)';
        ctx.beginPath(); ctx.arc((i*113)%GW, (i*79+20)%(GH*0.5), 4, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 1: { // Emo - rain + moon
      ctx.strokeStyle = 'rgba(100,100,200,0.28)'; ctx.lineWidth = 1;
      for (let i=0; i<35; i++) {
        const rx = (i*67 + t*80)%GW, ry = (i*53 + t*180)%GH;
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-3,ry+14); ctx.stroke();
      }
      // Moon
      ctx.fillStyle = '#d4d4ff'; ctx.beginPath(); ctx.arc(GW-65,52,32,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = PAL[1].sky; ctx.beginPath(); ctx.arc(GW-50,45,26,0,Math.PI*2); ctx.fill();
      break;
    }
    case 2: { // Army - matrix
      ctx.fillStyle = 'rgba(0,255,70,0.08)';
      ctx.font = '13px Courier New'; ctx.textAlign = 'left';
      for (let i=0; i<14; i++) {
        const x = i*57+8, y = (i*43 + Math.floor(t*6)*11)%GH;
        ctx.fillText(Math.random()>0.5?'1':'0', x, y);
        ctx.fillText(Math.random()>0.5?'0':'1', x, (y+22)%GH);
      }
      ctx.strokeStyle = 'rgba(0,255,70,0.05)'; ctx.lineWidth = 1;
      for (let x=0; x<GW; x+=45) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke(); }
      break;
    }
    case 3: { // IT/Party - confetti
      const cols = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
      for (let i=0; i<22; i++) {
        const x = (i*131 + Math.sin(t*0.8+i*0.9)*28)%GW;
        const y = (i*97  + Math.cos(t*1.1+i*0.7)*20)%GH;
        ctx.fillStyle = cols[i%6];
        ctx.save(); ctx.translate(x,y); ctx.rotate(t*1.5+i);
        ctx.fillRect(-4,-4,8,8); ctx.restore();
      }
      break;
    }
    case 4: { // Love - floating hearts
      ctx.fillStyle = 'rgba(255,105,180,0.28)';
      for (let i=0; i<10; i++) {
        const x = (i*90 + Math.sin(t*0.7+i)*22)%GW;
        const y = GH - ((i*70 + t*28)%(GH+30));
        heart(x, y, 12);
      }
      break;
    }
    case 5: { // Wedding - petals falling
      for (let i=0; i<18; i++) {
        const x = (i*70 + Math.sin(t*0.4+i)*18)%GW;
        const y = (t*22*(1+i%3*0.5) + i*45)%(GH+60) - 30;
        ctx.fillStyle = `rgba(255,${180+i*3},${180+i*4},0.55)`;
        ctx.beginPath(); ctx.ellipse(x,y,5,8,t+i,0,Math.PI*2); ctx.fill();
      }
      // Cross at back
      ctx.fillStyle = 'rgba(218,165,32,0.18)';
      ctx.fillRect(GW*0.5-6, 20, 12, 80);
      ctx.fillRect(GW*0.5-28, 42, 56, 12);
      break;
    }
    case 6: { // Baby - ZZZ
      ctx.fillStyle = 'rgba(100,150,255,0.18)';
      ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
      for (let i=0; i<5; i++) {
        const x = 100+i*150+Math.sin(t+i)*18;
        const y = 50+(i*45+t*18)%(GH*0.6);
        ctx.fillText('z', x, y);
      }
      break;
    }
    case 7: { // Missiles - city silhouette + stars
      ctx.fillStyle = 'rgba(255,220,80,0.7)';
      for (let i=0; i<28; i++) {
        const x=(i*137)%GW, y=(i*97)%(GH*0.45);
        const r = Math.abs(Math.sin(t*2.5+i))*1.2+0.5;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = 'rgba(40,40,40,0.6)';
      const bhs = [70,100,55,85,110,65,90,80,120,75,95,60,100,88];
      bhs.forEach((bh,i) => ctx.fillRect(i*58, GH-bh, 52, bh));
      break;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  PLATFORM DRAWING
// ═══════════════════════════════════════════════════════════
function drawPlatforms() {
  const cl = pal(), t = Date.now()*0.001;
  for (const pl of STAGE.platforms) {
    const sx = pl.x-CAM.x, sy = pl.y-CAM.y;
    if (sx>GW+30||sx+pl.w<-30||sy>GH+30||sy+pl.h<-30) continue;
    drawPlatform(pl, sx, sy, cl, t);
  }
}

function drawPlatform(pl, sx, sy, cl, t) {
  const isGround = pl.h > 30;
  switch (stageIdx) {
    case 0:
      if (isGround) { ctx.fillStyle='#ffb3c6'; ctx.fillRect(sx,sy,pl.w,pl.h); }
      else {
        ctx.fillStyle='#fff'; ctx.fillRect(sx,sy+6,pl.w,pl.h-6);
        ctx.fillStyle='rgba(255,255,255,0.9)';
        for (let i=0;i<Math.ceil(pl.w/28);i++) { ctx.beginPath(); ctx.arc(sx+i*28+14,sy,12,0,Math.PI*2); ctx.fill(); }
      }
      break;
    case 1:
      ctx.fillStyle = isGround ? '#1a0535' : '#4a235a';
      ctx.fillRect(sx,sy,pl.w,pl.h);
      if (!isGround) {
        ctx.fillStyle='#7b00cc'; ctx.fillRect(sx,sy,pl.w,3);
        if (pl.w>55) { ctx.font='15px Arial'; ctx.textAlign='center'; ctx.fillText('💀',sx+pl.w/2,sy+pl.h+2); }
      }
      break;
    case 2:
      ctx.fillStyle='#1a4a2e'; ctx.fillRect(sx,sy,pl.w,pl.h);
      ctx.strokeStyle='#27ae60'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,pl.w,pl.h);
      if (!isGround) {
        for (let i=0;i<Math.floor(pl.w/22);i++) {
          ctx.fillStyle=Math.floor(t*3+i)%2?'#00ff00':'#003300';
          ctx.fillRect(sx+i*22+5,sy+4,6,5);
        }
      }
      break;
    case 3:
      if (isGround) { ctx.fillStyle='#0f3460'; ctx.fillRect(sx,sy,pl.w,pl.h); }
      else {
        ctx.fillStyle='#8B4513'; ctx.fillRect(sx,sy,pl.w,pl.h);
        ctx.fillStyle='#A0522D'; ctx.fillRect(sx,sy,pl.w,4);
        // Laptop on desk
        if (pl.w>80) {
          ctx.fillStyle='#222'; ctx.fillRect(sx+pl.w/2-18,sy-18,36,20);
          ctx.fillStyle='#3498db'; ctx.fillRect(sx+pl.w/2-15,sy-16,30,16);
        }
      }
      break;
    case 4:
      if (isGround) { ctx.fillStyle='#f8bbd0'; ctx.fillRect(sx,sy,pl.w,pl.h); }
      else {
        ctx.fillStyle='#ff69b4'; ctx.fillRect(sx,sy+5,pl.w,pl.h-5);
        ctx.fillStyle='#ff1493';
        for (let i=0;i<Math.ceil(pl.w/28);i++) { ctx.save(); ctx.translate(sx+i*28+14,sy-4); heart(0,0,9); ctx.restore(); }
      }
      break;
    case 5:
      if (isGround) {
        ctx.fillStyle='#dc143c'; ctx.fillRect(sx,sy,pl.w,pl.h);
        ctx.fillStyle='rgba(0,0,0,0.1)';
        for (let i=0;i<Math.ceil(pl.w/28);i++) ctx.fillRect(sx+i*28,sy,14,pl.h);
      } else {
        ctx.fillStyle='#fff'; ctx.fillRect(sx,sy,pl.w,pl.h);
        ctx.fillStyle='#ffd700'; ctx.fillRect(sx,sy,pl.w,3);
        ctx.fillStyle='rgba(255,192,203,0.5)'; ctx.fillRect(sx,sy+3,pl.w,pl.h-3);
      }
      break;
    case 6:
      ctx.fillStyle = isGround?'#bbdefb':'#42a5f5'; ctx.fillRect(sx,sy,pl.w,pl.h);
      ctx.fillStyle='#90caf9'; ctx.fillRect(sx,sy,pl.w,3);
      break;
    case 7:
      ctx.fillStyle='#404040'; ctx.fillRect(sx,sy,pl.w,pl.h);
      ctx.fillStyle='#606060'; ctx.fillRect(sx,sy,pl.w,3);
      break;
    default:
      ctx.fillStyle=cl.p; ctx.fillRect(sx,sy,pl.w,pl.h);
      ctx.fillStyle=cl.g; ctx.fillRect(sx,sy,pl.w,3);
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE MACHINE
// ═══════════════════════════════════════════════════════════
let GS = 'upload'; // upload | story | playing | dead | stage_win | game_win
let stageIdx = 0;
let STAGE = null;
let storyTimer = 0;
let winTimer = 0;
let deadTimer = 0;
let msgText = ''; let msgTimer = 0;
let score = 0;
let stageBonus = 0; // shown briefly on stage win screen

function showMsg(m) { msgText = m; msgTimer = 90; }

function addScore(pts) {
  score += pts;
  showMsg(`+${pts} pts!`);
}

function hideOverlays() {
  document.getElementById('sc0').classList.add('off');
}

function startStage(idx) {
  stageIdx = idx;
  STAGE = makeStage(idx);
  STAGE.init();
  CAM.x = 0; CAM.y = 0;
  P = mkPlayer(STAGE.spawnX, STAGE.spawnY);
  GS = 'story';
  storyTimer = 0;
}

function nextState() {
  if (GS === 'story') { GS = 'playing'; storyTimer = 0; }
  else if (GS === 'stage_win') {
    const next = stageIdx + 1;
    if (next >= 8) { GS = 'game_win'; winTimer = 0; return; }
    startStage(next);
  }
}

// ═══════════════════════════════════════════════════════════
//  STAGE FACTORY
// ═══════════════════════════════════════════════════════════
function makeStage(idx) {
  switch(idx) {
    case 0: return mkS0();
    case 1: return mkS1();
    case 2: return mkS2();
    case 3: return mkS3();
    case 4: return mkS4();
    case 5: return mkS5();
    case 6: return mkS6();
    case 7: return mkS7();
  }
}

  return {

    storyTitle:'👶 Stage 1: Baby Omry!',
    storyLines:['The year is 1994. Baby Omry just learned to walk...','...and immediately started platforming, because of course.','Collect 7 baby bottles to grow up!','Watch out for the evil rattles! 🍼'],
    winTitle:'🍼 Baby Mode: COMPLETE!', winLines:['Omry has learned to walk, talk, and avoid evil toys.','Next stop: teenage angst...'],
    goal:{x:1840,y:318,w:90,h:78},

    init() { collected = 0; this.itemsCollected = 0; items.forEach(i=>i.collected=false); enemies.forEach(e=>{e.x=e.x<400?350:e.x<800?700:e.x<1200?1100:1500;}); },

    update(p) {
      const t = Date.now()*0.001;

      // Rattles
      for (const e of enemies) {
        const sx=e.x-cam.x, sy=e.y-cam.y;

      ctx.fillStyle = rdy ? flash(t,'#FFD700','#FF8C00',3) : '#888';

    winCondition(p) { return this.itemsCollected>=NEED && overlap(p,this.goal); }
  };
}

      if(spawnTimer>=rate){
        spawnTimer=0;
        missiles.push({x:Math.random()*(GW-30)+15, y:-40, vy:3+Math.random()*3, w:16,h:40, explode:0});
      }

      // Spawn cakes
      if(cakeTimer>=200){cakeTimer=0;cakes.push({x:Math.random()*(GW-30)+15,y:-20,vy:2,w:24,h:24,collected:false});}

      // Update missiles
      for(const m of missiles){
        if(m.explode>0){m.explode++;continue;}
        m.y+=m.vy;
        // Only explode on the ground (y>=390), never on platforms
        if(m.y+m.h>=390){m.explode=1;continue;}
        // Hit player
        if(p.invincible===0&&overlap(p,m)){m.explode=1;p.lives--;p.invincible=90;p.vy=-10;p.vx=(p.x<m.x)?-7:7;sfxHit();if(p.lives<=0){sfxGameOver();GS='dead';deadTimer=90;}}
      }
      missiles=missiles.filter(m=>m.explode<30);

      // Update cakes
      for(const c of cakes){
        c.y+=c.vy;
        if(!c.collected&&overlap(p,c)){c.collected=true;this.itemsCollected++;score+=200;sfxCollect();showMsg(`🎂 Cake! +200pts x${this.itemsCollected}`);}
      }
      cakes=cakes.filter(c=>!c.collected&&c.y<GH+30);
    },

    draw(cam){
      const t=Date.now()*0.001;
      // Missiles
      for(const m of missiles){
        const sx=m.x-cam.x, sy=m.y-cam.y;
        if(m.explode>0){
          const r=m.explode*5;
          ctx.globalAlpha=Math.max(0,1-m.explode/30);
          ctx.fillStyle='#f39c12'; ctx.beginPath(); ctx.arc(sx+8,sy+m.h/2,r,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(sx+8,sy+m.h/2,r*0.6,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=1; continue;
        }
        // Missile body
        ctx.fillStyle='#95a5a6'; ctx.fillRect(sx,sy+10,16,30);
        ctx.fillStyle='#e74c3c';
        ctx.beginPath(); ctx.moveTo(sx,sy+10); ctx.lineTo(sx+16,sy+10); ctx.lineTo(sx+8,sy); ctx.fill();
        ctx.fillStyle='#f39c12';
        ctx.beginPath(); ctx.moveTo(sx+2,sy+40); ctx.lineTo(sx-4,sy+50); ctx.lineTo(sx+8,sy+40); ctx.fill();
        ctx.beginPath(); ctx.moveTo(sx+14,sy+40); ctx.lineTo(sx+20,sy+50); ctx.lineTo(sx+8,sy+40); ctx.fill();
        // Flame
        if(Math.floor(t*8)%2){
          ctx.fillStyle='#f39c12'; ctx.beginPath(); ctx.arc(sx+8,sy+48,5+Math.random()*4,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx+8,sy+48,2+Math.random()*2,0,Math.PI*2); ctx.fill();
        }
      }
      // Cakes
      for(const c of cakes){
        if(c.collected)continue;
        const sx=c.x-cam.x, sy=c.y-cam.y;
        ctx.fillStyle='#f39c12'; ctx.fillRect(sx,sy+8,24,16);
        ctx.fillStyle='#fff'; ctx.fillRect(sx+2,sy+10,20,12);
        ctx.fillStyle='#e74c3c'; ctx.fillRect(sx+2,sy+8,20,4);
        ctx.fillStyle='#f39c12'; ctx.fillRect(sx+10,sy+1,4,8);
        ctx.fillStyle='#ffeb3b'; ctx.beginPath(); ctx.arc(sx+12,sy+1,3,0,Math.PI*2); ctx.fill();
      }
      // Survival timer (drawn in HUD)
    },

    winCondition(p){return this.survivalTimer>=this.survivalDuration;}
  };
}

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════
function drawHUD() {
  if(!P||!STAGE) return;
  const cl=pal(), t=Date.now()*0.001;

  // Lives
  ctx.font='22px Arial'; ctx.textAlign='left';
  for(let i=0;i<3;i++){
    ctx.globalAlpha=(i<P.lives)?1:0.25;
    ctx.fillText('❤️',10+i*26,26);
  }
  ctx.globalAlpha=1;

  // Stage
  ctx.fillStyle=cl.txt; ctx.font='bold 17px Courier New'; ctx.textAlign='center';
  ctx.fillText(`STAGE ${stageIdx+1} / 8`, GW/2, 20);

  // Score (top right)
  ctx.textAlign='right'; ctx.fillStyle='#FFD700'; ctx.font='bold 17px Courier New';
  ctx.fillText(`⭐ ${score.toLocaleString()}`, GW-10, 20);

  // Items collected (below score)
  if(STAGE.itemsNeeded>0){
    ctx.fillStyle=cl.txt; ctx.font='15px Courier New';
    ctx.fillText(`${STAGE.itemsCollected||0}/${STAGE.itemsNeeded}`,GW-10,38);
  }

  // Stage 7 timer
  if(stageIdx===7&&STAGE.survivalDuration){
    const remain=Math.max(0,Math.ceil((STAGE.survivalDuration-STAGE.survivalTimer)/60));
    ctx.fillStyle=remain<10?'#e74c3c':'#f39c12';
    ctx.font='bold 32px Courier New'; ctx.textAlign='center';
    ctx.fillText(`⏱ ${remain}s`,GW/2,50);
  }

  // Floating message
  if(msgTimer>0){
    ctx.globalAlpha=Math.min(1,msgTimer/30)*0.95;
    ctx.fillStyle='#FFD700'; ctx.font='bold 26px Courier New'; ctx.textAlign='center';
    ctx.fillText(msgText,GW/2,GH/2-60);
    ctx.globalAlpha=1; msgTimer--;
  }
}

// ═══════════════════════════════════════════════════════════
//  TOUCH CONTROLS
// ═══════════════════════════════════════════════════════════
function drawTouchCtrl() {
  const btns=getBtns();
  ctx.save();
  for(const b of btns){
    const active=(b.id==='left'&&TC.left)||(b.id==='right'&&TC.right)||(b.id==='jump'&&TC.jump);
    ctx.fillStyle=active?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.12)';
    ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,12); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font=`bold 34px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    if(b.id==='left')  ctx.fillText('◀',b.x+b.w/2,b.y+b.h/2);
    if(b.id==='right') ctx.fillText('▶',b.x+b.w/2,b.y+b.h/2);
    if(b.id==='jump')  ctx.fillText('🅰',b.x+b.w/2,b.y+b.h/2);
    ctx.textBaseline='alphabetic';
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  STORY SCREEN
// ═══════════════════════════════════════════════════════════
function drawStory() {
  if(!STAGE) return;
  const cl=pal();
  const bg=ctx.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,cl.sky); bg.addColorStop(1,cl.sky2);
  ctx.fillStyle=bg; ctx.fillRect(0,0,GW,GH);

  // Box (leave room for button below)
  const BX=GW/2-275, BY=42, BW=550, BH=GH-112;
  ctx.fillStyle='rgba(0,0,0,0.62)';
  ctx.beginPath(); ctx.roundRect(BX,BY,BW,BH,18); ctx.fill();

  const maxTw = BW - 44; // text max-width inside box (22px padding each side)
  ctx.textAlign='center';

  // Title (wrapped)
  const titleSz = clamp(20,3.5,30);
  ctx.font = `bold ${titleSz}px Courier New`;
  ctx.fillStyle = cl.txt;
  const titleLines = wrapTextMeasure(STAGE.storyTitle, maxTw);
  let y = BY + 46;
  titleLines.forEach(ln => { ctx.fillText(ln, GW/2, y); y += titleSz + 5; });
  y += 8;

  // Story lines (wrapped, smaller font)
  const lsz = clamp(14, 2.5, 17);
  const lh  = lsz + 8;
  STAGE.storyLines.forEach(line => {
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.font = `${lsz}px Courier New`;
    const wrapped = wrapTextMeasure(line, maxTw);
    wrapped.forEach(wl => { ctx.fillText(wl, GW/2, y); y += lh; });
    y += 5; // gap between entries
  });

  // PLAY button
  ctx.fillStyle='#e74c3c';
  ctx.beginPath(); ctx.roundRect(CONT_BTN.x,CONT_BTN.y,CONT_BTN.w,CONT_BTN.h,14); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 22px Courier New'; ctx.textAlign='center';
  ctx.fillText('▶  PLAY!', GW/2, CONT_BTN.y+40);
}

function clamp(base,vwFactor,max) {
  return Math.min(max, Math.max(base, Math.floor(window.innerWidth*vwFactor/100)));
}

// Wrap text to fit within maxWidth pixels (ctx.font must be set before calling)
function wrapTextMeasure(text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = w; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  return lines.length ? lines : [text];
}

// ═══════════════════════════════════════════════════════════

function drawStageWin() {
  if(!STAGE) return;
  const cl=pal(), t=Date.now()*0.001;
  const bg=ctx.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,cl.sky); bg.addColorStop(1,cl.sky2);
  ctx.fillStyle=bg; ctx.fillRect(0,0,GW,GH);

  // Confetti
  const cols=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
  for(let i=0;i<30;i++){
    const x=(i*137+t*40*((i%3)+1))%GW;
    const y=(i*97+t*30*((i%3)+1))%GH;
    ctx.fillStyle=cols[i%6];
    ctx.save(); ctx.translate(x,y); ctx.rotate(t*2+i);
    ctx.fillRect(-5,-5,10,10); ctx.restore();
  }

  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(GW/2-260,80,520,GH-160,18); ctx.fill();

  ctx.font='bold 30px Courier New'; ctx.textAlign='center';
  ctx.fillStyle='#FFD700';
  ctx.fillText('✨ STAGE COMPLETE! ✨', GW/2, 125);

  ctx.fillStyle='#fff'; ctx.font='bold 21px Courier New';
  ctx.fillText(STAGE.winTitle, GW/2, 160);

  // Score breakdown
  ctx.fillStyle='#FFD700'; ctx.font='bold 16px Courier New';
  ctx.fillText(`+${stageBonus} pts  (500 base + ${P?P.lives:0}×150 lives)`, GW/2, 188);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='16px Courier New';
  ctx.fillText(`Total Score: ⭐ ${score.toLocaleString()}`, GW/2, 208);

  STAGE.winLines.forEach((line,i)=>{
    ctx.fillStyle='rgba(255,255,255,0.82)';
    ctx.font='16px Courier New';
    ctx.fillText(line, GW/2, 220+i*30);
  });

  // CONTINUE button
  ctx.fillStyle='#27ae60';
  ctx.beginPath(); ctx.roundRect(CONT_BTN.x,CONT_BTN.y,CONT_BTN.w,CONT_BTN.h,14); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 22px Courier New'; ctx.textAlign='center';
  ctx.fillText('▶  CONTINUE', GW/2, CONT_BTN.y+40);
}

// ═══════════════════════════════════════════════════════════
//  FINAL WIN SCREEN
// ═══════════════════════════════════════════════════════════
function drawGameWin() {
  const t=Date.now()*0.001;
  // Gradient
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#1a1a2e'); g.addColorStop(1,'#16213e');
  ctx.fillStyle=g; ctx.fillRect(0,0,GW,GH);

  // Confetti explosion
  const cols=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e63','#1abc9c','#FFD700'];
  for(let i=0;i<50;i++){
    const x=(i*131+Math.sin(t*0.7+i*1.1)*60+t*20*((i%5)+1))%GW;
    const y=(i*97+Math.cos(t*0.8+i*0.9)*40+t*25*(1+i%4))%GH;
    ctx.fillStyle=cols[i%8];
    ctx.save(); ctx.translate(x,y); ctx.rotate(t*3+i*0.5);
    if(i%3===0){ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();}
    else ctx.fillRect(-5,-5,10,10);
    ctx.restore();
  }

  // Central card
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.beginPath(); ctx.roundRect(GW/2-300,20,600,GH-40,22); ctx.fill();

  // Title
  ctx.fillStyle='#FFD700'; ctx.font='bold 30px Courier New'; ctx.textAlign='center';
  ctx.fillText('🎂 HAPPY BIRTHDAY OMRY! 🎂', GW/2, 72);

  // Faces row
  const faces=[
    {spr:SPR.omry,  label:'Omry',    x:GW/2-190},
    {spr:SPR.amit,  label:'Amit',    x:GW/2-65},
    {spr:SPR.hadas, label:'Hadas',   x:GW/2+65},
    {spr:SPR.rinat, label:'Rinat 👰', x:GW/2+190},
  ];
  faces.forEach(f=>{
    faceCircle(f.spr, f.x, 138, 34, '#555');
    ctx.fillStyle='#fff'; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
    ctx.fillText(f.label, f.x, 182);
  });

  // Baby Daniel
  ctx.font='28px Arial'; ctx.textAlign='center';
  ctx.fillText('👶', GW/2, 222);
  ctx.fillStyle='#90caf9'; ctx.font='bold 11px Courier New';
  ctx.fillText('Daniel', GW/2, 238);

  // ── FINAL SCORE ──
  const rating = score>=10000?'S 🌟':score>=7000?'A 🥇':score>=5000?'B 🥈':score>=3000?'C 🥉':'D 😅';
  const ratingCol = score>=10000?'#FFD700':score>=7000?'#f39c12':score>=5000?'#bdc3c7':score>=3000?'#cd7f32':'#95a5a6';

  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(GW/2-240,248,480,90,12); ctx.fill();

  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='12px Courier New'; ctx.textAlign='center';
  ctx.fillText('FINAL SCORE', GW/2, 270);
  ctx.fillStyle='#FFD700'; ctx.font='bold 34px Courier New';
  ctx.fillText(`⭐ ${score.toLocaleString()}`, GW/2, 308);
  ctx.fillStyle=ratingCol; ctx.font='bold 18px Courier New';
  ctx.fillText(`RANK: ${rating}`, GW/2, 330);

  // ── Journey ──
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='12px Courier New';
  ctx.fillText('Baby → Emo → Army → IT → Rinat\'s Wedding → Married → Daniel', GW/2, 360);
  ctx.fillText("You're a legend. Happy Birthday! 🎂❤️", GW/2, 380);

  // Score guide (small)
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='10px Courier New';
  ctx.fillText('Items: +100pt  Stage clear: +500pt  Lives bonus: +150pt each  Missile cake: +200pt', GW/2, 402);

  // Pulse
  ctx.globalAlpha=0.5+Math.abs(Math.sin(t*2))*0.5;
  ctx.fillStyle='#FFD700'; ctx.font='bold 18px Courier New';
  ctx.fillText('🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉🎉', GW/2, 432);
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════════════════
function gameLoop() {
  requestAnimationFrame(gameLoop);

  // Apply canvas transform for scaling
  ctx.clearRect(0, 0, GW, GH);

  switch(GS) {
    case 'upload':
      // HTML overlay handles this; just draw a dark bg
      ctx.fillStyle='#111'; ctx.fillRect(0,0,GW,GH);
      break;

    case 'story':
      storyTimer++;
      drawStory();
      break;

    case 'playing':
      updatePlayer();
      if(STAGE) STAGE.update(P);
      updateCam();

      // Check win
      if(STAGE && STAGE.winCondition(P)) {
        // Stage complete bonus: 500 base + 150 per life remaining
        stageBonus = 500 + (P.lives * 150);
        score += stageBonus;
        sfxStageWin();
        GS='stage_win'; winTimer=0;
      }

      drawBG();
      drawPlatforms();
      if(STAGE) STAGE.draw(CAM);
      drawPlayer();
      drawHUD();
      drawTouchCtrl();
      break;

    case 'dead':
      deadTimer--;
      drawBG();
      drawPlatforms();
      drawPlayer();
      drawDead();
      if(deadTimer<=0){
        // Restart stage
        STAGE.init();
        P=mkPlayer(STAGE.spawnX, STAGE.spawnY);
        GS='playing';
      }
      break;

    case 'stage_win':
      winTimer++;
      drawStageWin();
      break;

    case 'game_win':
      winTimer++;
      drawGameWin();
      break;
  }
}

  const bgm = document.getElementById('bgm');
  bgm.volume = 0.55;
  bgm.play().catch(() => {});
  // Unlock Web Audio context
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  hideOverlays();
  startStage(0);
});

gameLoop();
